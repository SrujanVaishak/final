name: Market Hours Algo Runner

on:
  schedule:
    # Runs at 9:14 AM IST (3:44 UTC) on weekdays
    - cron: '44 3 * * 1-5'
  workflow_dispatch:  # Manual trigger option

jobs:
  run-market-algo:
    runs-on: ubuntu-latest
    timeout-minutes: 390  # 6.5 hours (9:15 AM to 3:45 PM)

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install ALL dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ta yfinance requests pyotp pandas logzero websocket-client smartapi-python datetime pycryptodome multitasking peewee python-dotenv loguru

    - name: Verify installations
      run: |
        python -c "import pyotp; print('✅ pyotp installed')"
        python -c "import logzero; print('✅ logzero installed')"
        python -c "import SmartApi; print('✅ SmartApi installed')"
        python -c "import yfinance; print('✅ yfinance installed')"
        python -c "import ta; print('✅ ta installed')"

    - name: Display Market Session Info
      run: |
        echo "📅 Date: $(TZ='Asia/Kolkata' date '+%A, %d %B %Y')"
        echo "🕒 Current IST: $(TZ='Asia/Kolkata' date '+%H:%M:%S')"
        echo "📈 Market Hours: 9:15 AM - 3:30 PM IST"
        echo "⏱️ Session Duration: 6 hours 15 minutes"
        echo "🚀 Starting at 9:14 AM (1 minute before market open)"
        echo "----------------------------------------"

    - name: Run Complete Market Session
      env:
        API_KEY: ${{ secrets.API_KEY }}
        CLIENT_CODE: ${{ secrets.CLIENT_CODE }}
        PASSWORD: ${{ secrets.PASSWORD }}
        TOTP_SECRET: ${{ secrets.TOTP_SECRET }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: |
        echo "🏁 STARTING MARKET SESSION ALGO at $(TZ='Asia/Kolkata' date)"
        echo "⏰ Will run until market closes at 3:30 PM IST"
        echo "----------------------------------------"
        
        # Calculate end time (3:45 PM IST to be safe)
        current_epoch=$(date +%s)
        
        # Set end time to 3:45 PM IST today
        end_time=$(TZ='Asia/Kolkata' date -d "15:45 today" +%s 2>/dev/null || \
                   TZ='Asia/Kolkata' date -v15H -v45M -v0S +%s 2>/dev/null)
        
        # If current time is after 3:45 PM, set end time to tomorrow
        if [ $current_epoch -gt $end_time ]; then
          end_time=$(TZ='Asia/Kolkata' date -d "tomorrow 15:45" +%s 2>/dev/null || \
                     TZ='Asia/Kolkata' date -v+1d -v15H -v45M -v0S +%s 2>/dev/null)
          echo "⚠️ Current time is after market hours. Will run tomorrow."
        fi
        
        # Calculate total runtime in minutes
        total_minutes=$(( ($end_time - $current_epoch) / 60 ))
        echo "📊 Planned runtime: ~${total_minutes} minutes"
        
        # Counter for iterations
        iteration=1
        
        # Run continuously until market closes
        while [ $(date +%s) -lt $end_time ]; do
          CURRENT_TIME_IST=$(TZ='Asia/Kolkata' date '+%H:%M:%S')
          CURRENT_DATE_IST=$(TZ='Asia/Kolkata' date '+%Y-%m-%d')
          
          echo "🔄 Iteration #$iteration | Time: $CURRENT_TIME_IST IST"
          
          # Run one iteration of the algo
          python ultimate_algo.py
          
          # Check exit status
          if [ $? -eq 0 ]; then
            echo "✅ Iteration completed successfully"
          else
            echo "⚠️ Iteration had some issues, but continuing..."
          fi
          
          # Wait 30 seconds before next iteration
          echo "⏳ Waiting 30 seconds until next run..."
          sleep 30
          
          # Increment counter
          iteration=$((iteration + 1))
          
          # Add a separator every 10 iterations for readability
          if [ $((iteration % 10)) -eq 0 ]; then
            echo "----------------------------------------"
            echo "📊 Progress Update: Completed $iteration iterations"
            echo "🕒 Current Time: $(TZ='Asia/Kolkata' date '+%H:%M:%S')"
            echo "----------------------------------------"
          fi
        done
        
        echo "----------------------------------------"
        echo "✅ MARKET SESSION COMPLETED at $(TZ='Asia/Kolkata' date '+%H:%M:%S')"
        echo "📊 Total iterations run: $iteration"
        echo "🎯 Algo has successfully completed today's market session!"

    - name: Session Completion Summary
      if: always()
      run: |
        echo "📈 MARKET SESSION SUMMARY"
        echo "─────────────────────────"
        echo "🕒 End Time: $(TZ='Asia/Kolkata' date '+%H:%M:%S')"
        echo "📅 Date: $(TZ='Asia/Kolkata' date '+%A, %d %B %Y')"
        echo "📊 Status: ${{ job.status }}"
        echo "─────────────────────────"
        echo "✅ Algo will run again tomorrow at 9:14 AM IST"

    - name: Notify completion
      if: always()
      run: |
        echo "📨 Final Status: ${{ job.status }}"
        echo "⏰ Next scheduled run: Tomorrow at 9:14 AM IST"
